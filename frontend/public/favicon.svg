<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="cubeOuterBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="topFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101f30" />
      <stop offset="100%" stop-color="#080f1a" />
    </linearGradient>

    <linearGradient id="diagonalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(256, 256) scale(1.6)">
    
    <polygon points="0,-130 115,-65 115,65 0,130 -115,65 -115,-65" fill="#0f172a" stroke="url(#cubeOuterBorder)" stroke-width="12" stroke-linejoin="round"/>

    <g opacity="0.85">
      <polygon points="0,95 70,55 0,15 -70,55" fill="#1e293b" stroke="url(#cyanGrad)" stroke-width="4" opacity="0.4" transform="translate(0, 15)"/>
      <polygon points="0,95 70,55 0,15 -70,55" fill="#1e293b" stroke="url(#cyanGrad)" stroke-width="4" opacity="0.7" transform="translate(0, -2)"/>
      <polygon points="0,95 70,55 0,15 -70,55" fill="#0f172a" stroke="url(#diagonalGrad)" stroke-width="5" transform="translate(0, -18)"/>
      <circle cx="-35" cy="50" r="3" fill="#38bdf8"/>
      <circle cx="35" cy="50" r="3" fill="#34d399"/>
      <line x1="-35" y1="50" x2="0" y2="68" stroke="#38bdf8" stroke-width="2"/>
      <line x1="35" y1="50" x2="0" y2="68" stroke="#34d399" stroke-width="2"/>
    </g>

    <path d="M -102,-52 L 0,6 L 0,112 L -102,52 Z" fill="none" stroke="url(#cyanGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M -102,-2 L -35,36" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M -102,23 L -15,72" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round"/>

    <path d="M 0,6 L 102,-52 L 102,52 L 0,112 Z" fill="none" stroke="url(#mintGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 30,23 L 102,-18" stroke="url(#mintGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 0,70 L 70,30" stroke="url(#mintGrad)" stroke-width="8" stroke-linecap="round"/>

    <polygon points="0,-112 102,-52 0,6 -102,-52" fill="url(#topFaceGrad)" stroke="url(#diagonalGrad)" stroke-width="10" stroke-linejoin="round" />

    <g transform="translate(0, -52) scale(1, 0.58) rotate(-15)">
      <path d="M -32,-18 L -55,0 L -32,18" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
      <path d="M -8,30 L 8,-30" fill="none" stroke="#60a5fa" stroke-width="12" stroke-linecap="round" />
      <path d="M 32,-18 L 55,0 L 32,18" fill="none" stroke="#34d399" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    </g>
    
  </g>
</svg>
